name: Build Android APK

on:
  push:
    branches: [main, android]
    tags: ["*.*.*"]

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod


      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: android/package-lock.json

      - name: Build NPM
        working-directory: ui
        run: npm ci && npm run build

      - name: Install JS dependencies
        working-directory: android
        run: npm ci

      - name: Build bundled server binary (linux/arm64)
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 \
            go build \
              -tags purego \
              -ldflags="-s -w" \
              -o android/android/app/src/main/jniLibs/arm64-v8a/libsecretpig.so \
              .

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Make gradlew executable
        run: chmod +x android/android/gradlew

      - name: Build debug APK
        working-directory: android/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: secretpig-android-debug
          path: |
            android/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
          if-no-files-found: error
    
      - name: Build release APK
        working-directory: android/android
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: secretpig-android-release
          path: |
            android/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 14
          if-no-files-found: error
