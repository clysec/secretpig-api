dockers_v2:
  - dockerfile: Dockerfile
    images:
      - clysec/secretpig-api
      - ghcr.io/clysec/secretpig-api
      - cycr.io/clysec/secretpig-api
    tags:
      - "{{ .Version }}"
      - latest
    platforms:
      - linux/amd64
      - linux/arm64


release:
  github:
    owner: clysec
    name: secretpig-api
