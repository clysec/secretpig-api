version: 2

builds: 
  - id: build
    main: main.go
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - arm64
      - amd64

  # - id: winbuild
  #   main: main.go
  #   env:
  #     - CGO_ENABLED=0
  #   goos:
  #     - windows
  #   goarch:
  #     - amd64
  #     - arm64

archives:
  - formats: [ tar.gz, binary ]
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [ zip, binary ]

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

